<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index Charts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0c0e13;
  --surface:#111318;
  --surface2:#181b23;
  --border:#1f2333;
  --border2:#252a3d;
  --text:#dde3f0;
  --muted:#3d4460;
  --dim:#1a1e2c;

  --up:#00d68f;
  --up-dim:rgba(0,214,143,.10);
  --dn:#f0415a;
  --dn-dim:rgba(240,65,90,.10);
  --flat:#4f8ef7;
  --flat-dim:rgba(79,142,247,.10);

  --orb-fill:rgba(246,201,14,.06);
  --orb-line:#f6c90e;

  --c-banknifty:#4f8ef7;
  --c-hdfc:#f6c90e;
  --c-icici:#00d68f;
}

body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:14px;min-height:100vh;}

/* ── Header ──────────────────────────────────────────────── */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.hdr-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;color:#fff;text-transform:uppercase;}
.hdr-title em{color:var(--flat);font-style:normal;}

.hdr-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.pulse{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s;}
.pulse.live{background:var(--up);animation:blink 1.6s infinite;}
@keyframes blink{0%{opacity:1;box-shadow:0 0 0 0 rgba(0,214,143,.4)}60%{opacity:.6;box-shadow:0 0 0 6px rgba(0,214,143,0)}100%{opacity:1;box-shadow:0 0 0 0 rgba(0,214,143,0)}}

.status-chip{font-size:10px;color:var(--muted);letter-spacing:.04em;}
.status-chip b{color:var(--text);font-weight:500;}

/* interval pills */
.iv-group{display:flex;gap:3px;}
.iv-btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.iv-btn.active,.iv-btn:hover{border-color:var(--flat);color:var(--flat);background:var(--flat-dim);}

/* date picker */
.date-group{display:flex;align-items:center;gap:6px;}
.date-label{font-size:10px;color:var(--muted);}
select.date-sel{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;}
select.date-sel:focus{outline:none;border-color:var(--flat);}
.live-btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--up);color:var(--up);background:var(--up-dim);cursor:pointer;display:none;}
.live-btn:hover{background:rgba(0,214,143,.2);}

/* ── Chart cards ────────────────────────────────────────── */
.charts-wrap{display:flex;flex-direction:column;gap:10px;}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.chart-card.bnk{border-top:2px solid var(--c-banknifty);}
.chart-card.hdf{border-top:2px solid var(--c-hdfc);}
.chart-card.ici{border-top:2px solid var(--c-icici);}

/* card header */
.ch{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 0;flex-wrap:wrap;gap:6px;}
.ch-left{display:flex;flex-direction:column;gap:1px;}
.ch-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.ch-meta{font-size:9px;color:var(--muted);}
.ch-right{display:flex;align-items:baseline;gap:8px;}
.ch-ltp{font-size:19px;font-weight:600;font-variant-numeric:tabular-nums;transition:color .25s;}
.ch-ltp.up{color:var(--up);} .ch-ltp.dn{color:var(--dn);} .ch-ltp.fl{color:var(--flat);}
.ch-chg{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;}
.ch-chg.up{background:var(--up-dim);color:var(--up);}
.ch-chg.dn{background:var(--dn-dim);color:var(--dn);}
.ch-chg.fl{background:var(--flat-dim);color:var(--flat);}

/* ohlc strip */
.ohlc{display:flex;gap:10px;padding:4px 12px;font-size:9px;color:var(--muted);flex-wrap:wrap;}
.ohlc .lbl{color:var(--muted);margin-right:2px;}
.ohlc .val{color:var(--text);font-weight:500;}

/* ORB badge */
.orb-strip{display:flex;gap:10px;align-items:center;padding:2px 12px 5px;font-size:9px;color:var(--muted);}
.orb-badge{padding:1px 7px;border-radius:3px;background:rgba(246,201,14,.12);color:var(--orb-line);font-weight:500;letter-spacing:.03em;}

/* canvas area */
.cv-wrap{position:relative;height:190px;padding:6px 10px 6px 48px;overflow:hidden;cursor:crosshair;}
canvas{display:block;width:100%!important;height:100%!important;}
.no-data{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:10px;letter-spacing:.05em;}

/* ── Tooltip ─────────────────────────────────────────────── */
.tip{position:fixed;background:#1a1d28;border:1px solid var(--border2);border-radius:5px;padding:7px 10px;font-size:10px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .12s;z-index:200;line-height:1.75;white-space:nowrap;}
.tip.show{opacity:1;}
.tip .tl{color:var(--muted);font-size:9px;margin-bottom:2px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Index <em>Charts</em></div>
  <div class="hdr-controls">
    <div class="pulse" id="pulse"></div>
    <div class="status-chip">AS OF <b id="as-of">--:--:--</b></div>
    <div class="status-chip">MODE <b id="mode-label">LIVE</b></div>
    <div class="iv-group" id="iv-group">
      <button class="iv-btn active" onclick="setIv(1,this)">1m</button>
      <button class="iv-btn"        onclick="setIv(3,this)">3m</button>
      <button class="iv-btn"        onclick="setIv(5,this)">5m</button>
    </div>
    <div class="date-group">
      <span class="date-label">DATE</span>
      <select class="date-sel" id="date-sel" onchange="onDateChange(this.value)">
        <option value="live">Live</option>
      </select>
      <input type="date" class="date-sel" id="date-input" title="Pick any date"
             onchange="onDateChange(this.value)" style="width:120px">
    </div>
    <button class="live-btn" id="live-btn" onclick="goLive()">↺ LIVE</button>
  </div>
</div>

<div class="charts-wrap" id="charts-wrap"></div>
<div class="tip" id="tip"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API   = '';          // same origin; set to 'http://your-server' if needed
const POLL  = 500;         // ms between live tick polls

// Must match kite_index_addon.py INDEX_TOKENS keys
const INSTRUMENTS = [
  { id:'banknifty', token:'260105',  label:'BankNifty', cls:'bnk', color:'#4f8ef7' },
  { id:'hdfc',      token:'341249',  label:'HDFC Bank', cls:'hdf', color:'#f6c90e' },
  { id:'icici',     token:'1270529', label:'ICICI Bank',cls:'ici', color:'#00d68f' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let ivMin       = 1;
let histDate    = null;   // null = live view; string = historical date being displayed
let pollTimer   = null;

// Per-instrument data
const D = {};
INSTRUMENTS.forEach(inst => {
  D[inst.token] = {
    candles:    [],   // sealed 1-min candles (aggregated to ivMin on draw)
    liveC:      null, // forming candle from server
    sessionOpen:null,
    ltp:        null,
    prevLtp:    null,
    orbHigh:    null,
    orbLow:     null,
    _render:    null, // saved render info for tooltip
  };
});

// ── DOM BUILD ─────────────────────────────────────────────────────────────────
function buildCards() {
  const wrap = document.getElementById('charts-wrap');
  INSTRUMENTS.forEach(inst => {
    wrap.insertAdjacentHTML('beforeend', `
      <div class="chart-card ${inst.cls}" id="card-${inst.id}">
        <div class="ch">
          <div class="ch-left">
            <div class="ch-name" style="color:${inst.color}">${inst.label}</div>
            <div class="ch-meta" id="meta-${inst.id}">–</div>
          </div>
          <div class="ch-right">
            <div class="ch-ltp fl" id="ltp-${inst.id}">–</div>
            <div class="ch-chg fl" id="chg-${inst.id}">–</div>
          </div>
        </div>
        <div class="ohlc" id="ohlc-${inst.id}">
          <span><span class="lbl">O</span><span class="val" id="o-${inst.id}">–</span></span>
          <span><span class="lbl">H</span><span class="val" id="h-${inst.id}">–</span></span>
          <span><span class="lbl">L</span><span class="val" id="l-${inst.id}">–</span></span>
          <span><span class="lbl">C</span><span class="val" id="c-${inst.id}">–</span></span>
        </div>
        <div class="orb-strip" id="orb-${inst.id}" style="display:none">
          <span class="orb-badge">15m ORB</span>
          <span>H <b id="orbH-${inst.id}" style="color:#f6c90e">–</b></span>
          <span>L <b id="orbL-${inst.id}" style="color:#f6c90e">–</b></span>
        </div>
        <div class="cv-wrap" id="wrap-${inst.id}">
          <div class="no-data" id="nd-${inst.id}">Waiting for data…</div>
          <canvas id="cv-${inst.id}" style="display:none"></canvas>
        </div>
      </div>
    `);
    const wrapEl = document.getElementById(`wrap-${inst.id}`);
    wrapEl.addEventListener('mousemove', e => onHover(e, inst));
    wrapEl.addEventListener('mouseleave', hideTip);
  });
}

// ── CANDLE AGGREGATION ────────────────────────────────────────────────────────
// Aggregate raw 1-min candles into ivMin-minute candles
function aggregate(rawCandles, ivM) {
  if (!ivM || ivM <= 1) return rawCandles.map(c => ({ ...c }));
  const out = [];
  rawCandles.forEach(c => {
    // Floor ts to ivM-minute bucket
    const bucket = Math.floor(c.ts / (ivM * 60)) * (ivM * 60);
    if (!out.length || out[out.length-1].ts !== bucket) {
      out.push({ ts:bucket, time_label:c.time_label, open:c.open, high:c.high, low:c.low, close:c.close });
    } else {
      const last = out[out.length-1];
      last.high  = Math.max(last.high, c.high);
      last.low   = Math.min(last.low,  c.low);
      last.close = c.close;
    }
  });
  return out;
}

// ── ORB CALCULATION (first 15 minutes = 15 raw 1-min candles) ────────────────
function calcORB(rawCandles) {
  const ORB_MINS = 15;
  if (!rawCandles.length) return { high: null, low: null };
  // Market open is 09:15 IST; take first ORB_MINS candles
  const orbSlice = rawCandles.slice(0, ORB_MINS);
  const high = Math.max(...orbSlice.map(c => c.high));
  const low  = Math.min(...orbSlice.map(c => c.low));
  return { high, low };
}

// ── LIVE TICK INGEST ──────────────────────────────────────────────────────────
function ingestLiveTick(token, ltp, ts, serverLiveCandle) {
  const d = D[token];
  if (d.sessionOpen == null) d.sessionOpen = ltp;
  d.prevLtp = d.ltp;
  d.ltp     = ltp;
  // Use server-provided live candle (already has correct OHLC)
  if (serverLiveCandle && serverLiveCandle.start_ts != null) {
    d.liveC = {
      ts:         serverLiveCandle.start_ts,
      time_label: fmtTS(serverLiveCandle.start_ts),
      open:  serverLiveCandle.open,
      high:  serverLiveCandle.high,
      low:   serverLiveCandle.low,
      close: serverLiveCandle.close,
    };
  }
}

// ── POLLING ───────────────────────────────────────────────────────────────────
async function fetchLive() {
  try {
    const res  = await fetch(`${API}/index-ltp`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    document.getElementById('as-of').textContent = data.as_of || '--';
    document.getElementById('pulse').classList.add('live');

    INSTRUMENTS.forEach(inst => {
      const tick = data.ticks?.[inst.token];
      const lc   = data.live_candles?.[inst.token];
      if (!tick || tick.ltp == null) return;
      ingestLiveTick(inst.token, tick.ltp, tick.ts, lc);
      // Always accumulate sealed candles for when user returns to live view
      maybeAccumulateLiveCandle(inst.token);
      if (histDate) return;   // historical mode — don't repaint
      updateLtpUI(inst);
      updateOhlcUI(inst);
      drawChart(inst, true);
    });
  } catch(e) {
    document.getElementById('pulse').classList.remove('live');
  }
}

async function fetchHistorical(dateStr) {
  try {
    const res  = await fetch(`${API}/index-candles?date=${dateStr}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    INSTRUMENTS.forEach(inst => {
      const rows = data.candles?.[inst.token] || [];
      D[inst.token].candles    = rows;
      D[inst.token].liveC      = null;
      D[inst.token].ltp        = rows.length ? rows[rows.length-1].close : null;
      D[inst.token].sessionOpen= rows.length ? rows[0].open : null;
      const orb = calcORB(rows);
      D[inst.token].orbHigh = orb.high;
      D[inst.token].orbLow  = orb.low;
      updateLtpUI(inst);
      updateOhlcUI(inst);
      drawChart(inst, false);
    });

  } catch(e) {
    console.error('History fetch error:', e);
  }
}

async function fetchDates() {
  try {
    const res  = await fetch(`${API}/index-dates`);
    const data = await res.json();
    const sel  = document.getElementById('date-sel');
    (data.dates || []).forEach(d => {
      const opt  = document.createElement('option');
      opt.value  = d;
      opt.textContent = d;
      sel.appendChild(opt);
    });
  } catch(e) { /* no dates yet */ }
}

// ── MODE SWITCHING ────────────────────────────────────────────────────────────
// Live polling ALWAYS runs. In historical mode we just render a snapshot instead.

function onDateChange(val) {
  if (val === 'live') { goLive(); return; }
  histDate = val;  // set display mode to historical
  document.getElementById('live-btn').style.display = 'inline-block';
  document.getElementById('mode-label').textContent = 'HIST';
  document.getElementById('as-of').textContent = val;
  fetchHistorical(val);
  // Live poll keeps running silently — D[token] state stays current
}

function goLive() {
  histDate = null;
  document.getElementById('live-btn').style.display = 'none';
  document.getElementById('date-sel').value = 'live';
  document.getElementById('date-input').value = '';
  document.getElementById('mode-label').textContent = 'LIVE';
  // Redraw all charts using the already-accumulated live data instantly
  INSTRUMENTS.forEach(inst => {
    updateLtpUI(inst);
    updateOhlcUI(inst);
    drawChart(inst, true);
  });
}

// Historical view uses its own separate display buffers so live D[token] is untouched
const histD = {};   // { token: { candles, orbHigh, orbLow } }

async function fetchHistorical(dateStr) {
  // Show loading state on all charts
  INSTRUMENTS.forEach(inst => {
    document.getElementById(`nd-${inst.id}`).textContent = 'Fetching data…';
    document.getElementById(`nd-${inst.id}`).style.display = 'flex';
    document.getElementById(`cv-${inst.id}`).style.display = 'none';
  });

  try {
    const res  = await fetch(`${API}/index-candles?date=${dateStr}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // If server fetched from Kite API (not DB), update the dates dropdown
    if (data.source === 'kite_api') fetchDates();

    INSTRUMENTS.forEach(inst => {
      const rows = data.candles?.[inst.token] || [];
      const orb  = calcORB(rows);
      histD[inst.token] = { candles: rows, orbHigh: orb.high, orbLow: orb.low };

      if (!rows.length) {
        document.getElementById(`nd-${inst.id}`).textContent = 'No data for this date';
        document.getElementById(`nd-${inst.id}`).style.display = 'flex';
        document.getElementById(`cv-${inst.id}`).style.display = 'none';
        return;
      }

      drawHistChart(inst, rows, orb);
      const last = rows[rows.length - 1];
      const el   = document.getElementById(`ltp-${inst.id}`);
      if (last) { el.textContent = fmt(last.close); el.className = 'ch-ltp fl'; }
      updateOhlcHistUI(inst, last);
      document.getElementById(`meta-${inst.id}`).textContent =
        `${ivMin}m · ${rows.length} candles · ${dateStr}` + (data.source === 'kite_api' ? ' · via Kite API' : '');
    });
  } catch(e) {
    INSTRUMENTS.forEach(inst => {
      document.getElementById(`nd-${inst.id}`).textContent = 'Error: ' + e.message;
    });
    console.error('History fetch error:', e);
  }
}

function drawHistChart(inst, rows, orb) {
  // Temporarily swap D[token] to render historical data, then restore
  const saved = {
    candles: D[inst.token].candles,
    liveC:   D[inst.token].liveC,
    orbHigh: D[inst.token].orbHigh,
    orbLow:  D[inst.token].orbLow,
  };
  D[inst.token].candles = rows;
  D[inst.token].liveC   = null;
  D[inst.token].orbHigh = orb.high;
  D[inst.token].orbLow  = orb.low;
  drawChart(inst, false);
  D[inst.token].candles = saved.candles;
  D[inst.token].liveC   = saved.liveC;
  D[inst.token].orbHigh = saved.orbHigh;
  D[inst.token].orbLow  = saved.orbLow;
}

function updateOhlcHistUI(inst, candle) {
  if (!candle) return;
  ['o','h','l','c'].forEach((k, i) => {
    const key = ['open','high','low','close'][i];
    document.getElementById(`${k}-${inst.id}`).textContent = fmt(candle[key]);
  });
}

function setIv(min, btn) {
  ivMin = min;
  document.querySelectorAll('.iv-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (histDate) {
    INSTRUMENTS.forEach(inst => {
      const hd = histD[inst.token];
      if (hd) drawHistChart(inst, hd.candles, { high: hd.orbHigh, low: hd.orbLow });
    });
  } else {
    INSTRUMENTS.forEach(inst => drawChart(inst, true));
  }
}

function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  fetchLive();
  pollTimer = setInterval(fetchLive, POLL);
}

// ── LIVE CANDLE STORAGE (from server live_candles, seal when minute changes) ──
// For live mode we also need to accumulate sealed candles.
// We detect a sealed candle when the live candle's start_ts changes.
const prevLiveBucket = {};

function maybeAccumulateLiveCandle(token) {
  const d   = D[token];
  const lc  = d.liveC;
  if (!lc) return;
  const prev = prevLiveBucket[token];
  if (prev != null && lc.ts !== prev) {
    // A new bucket opened — the previous candle is now sealed
    // Push it only if not already stored
    const candles = d.candles;
    if (!candles.length || candles[candles.length-1].ts !== prev) {
      // Reconstruct the sealed candle from the transition
      // (server already moved to new bucket, old values gone — we cached them)
      if (D[token]._prevLiveC) {
        candles.push({ ...D[token]._prevLiveC });
        // Recalculate ORB when we have enough candles
        if (candles.length === 15) {
          const orb = calcORB(candles);
          D[token].orbHigh = orb.high;
          D[token].orbLow  = orb.low;
        }
      }
    }
  }
  D[token]._prevLiveC = { ...lc, ts: lc.ts };
  prevLiveBucket[token] = lc.ts;
}

// Hook into drawChart to accumulate
const _origDraw = window._draw;

// ── DRAW ENGINE ───────────────────────────────────────────────────────────────
const CW  = 9;    // candle body width px
const GAP = 2;    // gap between candles
const YPAD = 10;  // px padding top & bottom inside chart

function drawChart(inst, live) {
  if (live) maybeAccumulateLiveCandle(inst.token);

  const d      = D[inst.token];
  const raw    = [...d.candles, ...(d.liveC && live ? [d.liveC] : [])];
  const all    = aggregate(raw, ivMin);
  const isLast = live && d.liveC != null;

  const nd = document.getElementById(`nd-${inst.id}`);
  const cv = document.getElementById(`cv-${inst.id}`);

  if (!all.length) { nd.style.display='flex'; cv.style.display='none'; return; }
  nd.style.display = 'none'; cv.style.display = 'block';

  const wrapEl = document.getElementById(`wrap-${inst.id}`);
  const W = wrapEl.clientWidth - 48;
  const H = wrapEl.clientHeight - 12;
  const dpr = window.devicePixelRatio || 1;
  cv.width  = W * dpr;
  cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // ── Price range ──
  let hi = -Infinity, lo = Infinity;
  all.forEach(c => { hi = Math.max(hi, c.high); lo = Math.min(lo, c.low); });

  // Include ORB in range so lines always visible
  if (d.orbHigh != null) hi = Math.max(hi, d.orbHigh);
  if (d.orbLow  != null) lo = Math.min(lo, d.orbLow);

  const pad = (hi - lo) * 0.1 || hi * 0.002 || 1;
  hi += pad; lo -= pad;
  const range = hi - lo || 1;
  const toY = v => YPAD + ((hi - v) / range) * (H - YPAD * 2);

  // ── Grid + Y-axis ──
  ctx.font = `${9 * dpr}px JetBrains Mono,monospace`;
  ctx.textAlign = 'right';
  const steps = 4;
  for (let i = 0; i <= steps; i++) {
    const v = lo + (hi - lo) * (i / steps);
    const y = toY(v);
    ctx.strokeStyle = '#1a1e2c'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillStyle = '#3d4460';
    ctx.fillText(fmt(v), -4, y + 3);
  }

  // ── ORB dashed lines ──
  if (d.orbHigh != null && d.orbLow != null) {
    const yH = toY(d.orbHigh);
    const yL = toY(d.orbLow);

    ctx.save();
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = '#f6c90e';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.75;
    ctx.beginPath(); ctx.moveTo(0, yH); ctx.lineTo(W, yH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, yL); ctx.lineTo(W, yL); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // ORB value labels pinned to the right edge
    ctx.save();
    ctx.font = `${9 * dpr}px JetBrains Mono,monospace`;
    ctx.fillStyle = '#f6c90e';
    ctx.globalAlpha = 0.85;
    ctx.textAlign = 'right';
    ctx.fillText('ORB H ' + fmt(d.orbHigh), W - 2, yH - 3);
    ctx.fillText('ORB L ' + fmt(d.orbLow),  W - 2, yL + 10);
    ctx.restore();

    // Update ORB strip
    const strip = document.getElementById(`orb-${inst.id}`);
    strip.style.display = 'flex';
    document.getElementById(`orbH-${inst.id}`).textContent = fmt(d.orbHigh);
    document.getElementById(`orbL-${inst.id}`).textContent = fmt(d.orbLow);
  }

  // ── Candles ──
  const totalW = all.length * (CW + GAP);
  const startX = Math.max(0, totalW - W);

  ctx.textAlign = 'right';
  all.forEach((c, i) => {
    const x = i * (CW + GAP) - startX + GAP;
    if (x + CW < 0 || x > W) return;

    const isLive = isLast && i === all.length - 1;
    const isUp   = c.close >= c.open;
    const col    = isUp ? inst.color : '#f0415a';

    const bodyTop = toY(Math.max(c.open, c.close));
    const bodyBot = toY(Math.min(c.open, c.close));
    const bodyH   = Math.max(1, bodyBot - bodyTop);

    // Wick
    ctx.strokeStyle = isLive ? col + '66' : '#2e3450';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + CW/2, toY(c.high));
    ctx.lineTo(x + CW/2, toY(c.low));
    ctx.stroke();

    // Body
    ctx.fillStyle = isLive ? col + '55' : col;
    ctx.fillRect(x, bodyTop, CW, bodyH);
    if (isLive) {
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.strokeRect(x, bodyTop, CW, bodyH);
    }
  });

  d._render = { all, startX, W, H };
}

// ── LTP / OHLC UI ─────────────────────────────────────────────────────────────
function updateLtpUI(inst) {
  const d   = D[inst.token];
  const el  = document.getElementById(`ltp-${inst.id}`);
  const el2 = document.getElementById(`chg-${inst.id}`);
  if (d.ltp == null) return;

  const dir = d.prevLtp == null ? 'fl' : d.ltp > d.prevLtp ? 'up' : d.ltp < d.prevLtp ? 'dn' : 'fl';
  el.textContent  = fmt(d.ltp);
  el.className    = `ch-ltp ${dir}`;
  setTimeout(() => { el.className = `ch-ltp fl`; }, 400);

  if (d.sessionOpen) {
    const diff = d.ltp - d.sessionOpen;
    const pct  = (diff / d.sessionOpen * 100).toFixed(2);
    const cls  = diff > 0 ? 'up' : diff < 0 ? 'dn' : 'fl';
    el2.textContent = (diff > 0 ? '+' : '') + pct + '%';
    el2.className   = `ch-chg ${cls}`;
  }
}

function updateOhlcUI(inst) {
  const d = D[inst.token];
  const c = d.liveC || (d.candles.length ? d.candles[d.candles.length-1] : null);
  if (!c) return;
  ['o','h','l','c'].forEach((k, i) => {
    const key = ['open','high','low','close'][i];
    document.getElementById(`${k}-${inst.id}`).textContent = fmt(c[key]);
  });
  document.getElementById(`meta-${inst.id}`).textContent =
    `${ivMin}m · ${d.candles.length + (d.liveC ? 1 : 0)} candles`;
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
function onHover(e, inst) {
  const d = D[inst.token];
  if (!d._render) return;
  const { all, startX } = d._render;
  const cv   = document.getElementById(`cv-${inst.id}`);
  const rect = cv.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const idx  = Math.floor((mx + startX - GAP) / (CW + GAP));
  if (idx < 0 || idx >= all.length) { hideTip(); return; }
  const c   = all[idx];
  const dir = c.close >= c.open ? '#00d68f' : '#f0415a';
  const pct = ((c.close - c.open) / c.open * 100).toFixed(2);
  const tip = document.getElementById('tip');
  tip.innerHTML = `
    <div class="tl">${c.time_label} · ${inst.label}</div>
    <div>O <b style="color:#dde3f0">${fmt(c.open)}</b> &nbsp; H <b style="color:#00d68f">${fmt(c.high)}</b></div>
    <div>L <b style="color:#f0415a">${fmt(c.low)}</b> &nbsp; C <b style="color:${dir}">${fmt(c.close)}</b></div>
    <div style="color:${dir}">${pct}%</div>
  `;
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 16) + 'px';
  tip.classList.add('show');
}
function hideTip() { document.getElementById('tip').classList.remove('show'); }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(v) {
  if (v == null || isNaN(v)) return '–';
  return v >= 1000
    ? v.toLocaleString('en-IN', { maximumFractionDigits: 2 })
    : v.toFixed(2);
}
function fmtTS(ts) {
  const d = new Date(ts * 1000);
  const ist = new Date(d.getTime() + (5.5 * 3600000));
  return ist.getUTCHours().toString().padStart(2,'0') + ':' + ist.getUTCMinutes().toString().padStart(2,'0');
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
let rzTimer;
window.addEventListener('resize', () => {
  clearTimeout(rzTimer);
  rzTimer = setTimeout(() => {
    if (histDate) {
      INSTRUMENTS.forEach(inst => {
        const hd = histD[inst.token];
        if (hd) drawHistChart(inst, hd.candles, { high: hd.orbHigh, low: hd.orbLow });
      });
    } else {
      INSTRUMENTS.forEach(inst => drawChart(inst, true));
    }
  }, 200);
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildCards();
fetchDates();
startPoll();
</script>
